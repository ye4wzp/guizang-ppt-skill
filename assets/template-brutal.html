<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[必填] 替换为 PPT 标题 · Deck Title</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    /* ============ 主题色(默认:⚡ 经典) ============
       切换主题:从 references/themes-brutal.md 复制对应的 :root 块
       整体替换这几行,其他地方散落的 var() 引用无需逐处改 */
    --bg:#ffffff;
    --fg:#000000;
    --red:#ff3b30;
    --yellow:#ffcc00;
    --blue:#007aff;

    /* ============ 字体(跨主题固定) ============ */
    --mono:"Space Mono","Fira Code",ui-monospace,monospace;
    --sans:"Inter","Noto Sans SC",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--fg);font-family:var(--sans);-webkit-font-smoothing:antialiased}

  /* ============ Deck 容器 + 翻页 ============ */
  #deck{position:fixed;inset:0;width:10000vw;height:100vh;display:flex;flex-wrap:nowrap;transition:transform .5s cubic-bezier(.4,0,.2,1);z-index:10;will-change:transform}
  .slide{width:100vw;height:100vh;flex:0 0 100vw;position:relative;padding:6vh 5vw 10vh;display:flex;flex-direction:column;overflow:hidden}
  .slide.light{color:var(--fg);background:var(--bg)}
  .slide.dark{color:var(--bg);background:var(--fg)}
  .slide.accent-red{color:#fff;background:var(--red)}
  .slide.accent-yellow{color:var(--fg);background:var(--yellow)}

  /* ============ 导航 ============ */
  #nav{position:fixed;left:50%;bottom:2.5vh;transform:translateX(-50%);z-index:30;display:flex;gap:6px}
  #nav .dot{width:10px;height:10px;background:var(--fg);border:0;padding:0;cursor:pointer;opacity:.15;transition:all .2s}
  #nav .dot:hover{opacity:.3}
  #nav .dot.active{opacity:1;width:28px}
  body:not(.light-bg) #nav .dot{background:var(--bg)}
  #hint{position:fixed;bottom:2.8vh;right:3vw;z-index:30;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.3;mix-blend-mode:difference;color:#aaa}

  /* ============ 字体层级（超粗无衬线） ============ */
  .brutal-kicker{font-family:var(--mono);font-size:11px;letter-spacing:.15em;text-transform:uppercase;opacity:.4;margin-bottom:2vh}
  .brutal-title{font-family:var(--sans);font-weight:900;font-size:min(12vw,18vh);line-height:.88;letter-spacing:-.04em;text-transform:uppercase}
  .brutal-title-md{font-family:var(--sans);font-weight:900;font-size:min(7vw,11vh);line-height:.9;letter-spacing:-.03em;text-transform:uppercase}
  .brutal-sub{font-family:var(--mono);font-weight:700;font-size:min(3vw,4.5vh);line-height:1.3;letter-spacing:-.01em}
  .brutal-body{font-family:var(--sans);font-weight:400;font-size:16px;line-height:1.6;max-width:480px}
  .brutal-num{font-family:var(--mono);font-weight:700;font-size:min(18vw,28vh);line-height:.82;letter-spacing:-.05em}
  .brutal-meta{font-family:var(--mono);font-size:11px;letter-spacing:.15em;text-transform:uppercase;opacity:.4}

  /* ============ 粗描边卡 ============ */
  .brutal-card{border:3px solid var(--fg);padding:24px 28px;position:relative}
  .brutal-card.accent-red{background:var(--red);color:#fff;border-color:var(--red)}
  .brutal-card.accent-yellow{background:var(--yellow);color:var(--fg);border-color:var(--yellow)}
  .brutal-card.accent-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
  .brutal-card.dark{background:var(--fg);color:var(--bg);border-color:var(--fg)}

  /* ============ 贴纸标签 ============ */
  .sticker{display:inline-block;background:var(--yellow);color:var(--fg);font-family:var(--mono);font-weight:700;font-size:12px;padding:4px 12px;transform:rotate(-2deg);letter-spacing:.08em;text-transform:uppercase}
  .sticker.red{background:var(--red);color:#fff;transform:rotate(-1deg)}
  .sticker.blue{background:var(--blue);color:#fff;transform:rotate(1deg)}

  /* ============ 装饰色块（故意溢出） ============ */
  .brutal-block{position:absolute}
  .brutal-block.red{background:var(--red)}
  .brutal-block.yellow{background:var(--yellow)}
  .brutal-block.blue{background:var(--blue)}
  .brutal-block.fg{background:var(--fg)}

  /* ============ 布局工具 ============ */
  .frame{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .brutal-split{display:grid;grid-template-columns:1fr 1fr;gap:4vw;flex:1;align-content:center}
  .brutal-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3vw;flex:1;align-content:center}
  .brutal-col{display:flex;flex-direction:column;gap:2vh}
  .brutal-center{flex:1;display:flex;flex-direction:column;justify-content:center}
  .brutal-bottom{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding-bottom:6vh}

  /* ============ Lucide 图标 ============ */
  .ico{width:1em;height:1em;display:inline-block;vertical-align:-.12em;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}

  /* ============ 动效系统 ============ */
  [data-anim]{opacity:1}
  body.motion-ready [data-anim]{opacity:0;transform:translateY(20px)}
  body.low-power [data-anim]{opacity:1!important;transform:none!important}

  /* ============ 响应式降级 ============ */
  @media(max-width:900px){
    .brutal-title{font-size:16vw}
    .brutal-title-md{font-size:11vw}
    .brutal-split{grid-template-columns:1fr}
    .brutal-grid-3{grid-template-columns:1fr}
    .brutal-right{display:none}
  }
</style>
</head>
<body>
<script>
  (function(){
    const KEY='guizang-ppt-low-power';
    const stored=localStorage.getItem(KEY);
    window.__lowPowerMode=stored==='1';
    function updateHint(){
      const hint=document.getElementById('hint');
      if(hint) hint.textContent=`点击翻页 · ← → · B ${window.__lowPowerMode?'动态':'静态'} · ESC 索引`;
    }
    window.__setLowPowerMode=function(on,opts={}){
      window.__lowPowerMode=!!on;
      document.body.classList.toggle('low-power',window.__lowPowerMode);
      if(opts.persist!==false) localStorage.setItem(KEY,window.__lowPowerMode?'1':'0');
      if(window.__lowPowerMode&&document.getAnimations){document.getAnimations().forEach(a=>a.cancel())}
      updateHint();
      dispatchEvent(new CustomEvent('ppt-low-power-change',{detail:{on:window.__lowPowerMode}}));
      if(window.__playSlide) window.__playSlide(window.__currentSlideIndex||0);
    };
    document.body.classList.toggle('low-power',window.__lowPowerMode);
    addEventListener('DOMContentLoaded',updateHint,{once:true});
  })();
</script>

<div id="hint">点击翻页 · ← → · B 静态 · ESC 索引</div>

<div id="deck">

<!-- ============================================================
     SLIDES 插入区 · 在此处填充所有 <section class="slide ..."> 页面
     主题类：.light / .dark / .accent-red / .accent-yellow
     布局类：.brutal-split / .brutal-grid-3 / .brutal-center / .brutal-bottom
             .frame / .brutal-col
     字体类：.brutal-kicker / .brutal-title / .brutal-title-md / .brutal-sub
             .brutal-body / .brutal-num / .brutal-meta
     组件类：.brutal-card / .sticker / .brutal-block
     ============================================================ -->

<!-- SLIDES_HERE -->

</div>

<div id="nav"></div>

<script>
const deck=document.getElementById('deck');
const slides=deck.querySelectorAll('.slide');
const nav=document.getElementById('nav');
let idx=0,total=slides.length,lock=false;

deck.style.width=(total*100)+'vw';

slides.forEach((s,i)=>{
  const b=document.createElement('button');
  b.className='dot';b.dataset.i=i;b.setAttribute('aria-label','Page '+(i+1));
  b.onclick=()=>go(i);
  nav.appendChild(b);
});

function go(n){
  if(lock)return;
  idx=Math.max(0,Math.min(total-1,n));
  window.__currentSlideIndex=idx;
  deck.style.transform=`translateX(${-idx*100}vw)`;
  nav.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  const el=slides[idx];
  const th=el.dataset.theme||(el.classList.contains('light')?'light':'dark');
  document.body.classList.toggle('light-bg',th==='light');
  if(window.__playSlide) setTimeout(()=>window.__playSlide(idx),250);
  lock=true;setTimeout(()=>lock=false,400);
}

/* ESC 索引视图 */
let overviewOn=false;
const ov=document.createElement('div');
ov.id='overview';
ov.style.cssText='position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.92);backdrop-filter:blur(12px);display:none;overflow-y:auto;padding:4vh 4vw';
document.body.appendChild(ov);

function buildOverview(){
  ov.innerHTML='';
  const grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:2vh 1.6vw;max-width:90vw;margin:0 auto';
  slides.forEach((s,i)=>{
    const card=document.createElement('div');
    card.style.cssText='cursor:pointer;overflow:hidden;border:2px solid '+(i===idx?'rgba(255,255,255,.6)':'rgba(255,255,255,.1)')+';transition:border-color .2s';
    card.onmouseenter=()=>card.style.borderColor='rgba(255,255,255,.4)';
    card.onmouseleave=()=>card.style.borderColor=i===idx?'rgba(255,255,255,.6)':'rgba(255,255,255,.1)';
    const wrap=document.createElement('div');
    wrap.style.cssText='width:100%;aspect-ratio:16/9;overflow:hidden;position:relative;pointer-events:none;background:'+(s.classList.contains('light')?'var(--bg)':'var(--fg)');
    const clone=s.cloneNode(true);
    clone.style.cssText='width:100vw;height:100vh;transform:scale('+(1/4.5)+');transform-origin:top left;position:absolute;top:0;left:0;pointer-events:none';
    wrap.appendChild(clone);
    const label=document.createElement('div');
    label.style.cssText='padding:6px 10px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#fff;opacity:.5';
    label.textContent=(i+1)+' / '+total;
    card.appendChild(wrap);card.appendChild(label);
    card.onclick=()=>{toggleOverview();go(i)};
    grid.appendChild(card);
  });
  ov.appendChild(grid);
}
function toggleOverview(){overviewOn=!overviewOn;if(overviewOn){buildOverview();ov.style.display='block'}else{ov.style.display='none'}}

addEventListener('keydown',e=>{
  if(e.key==='Escape'){e.preventDefault();toggleOverview();return}
  if(e.key&&e.key.toLowerCase()==='b'&&!e.metaKey&&!e.ctrlKey&&!e.altKey){e.preventDefault();window.__setLowPowerMode(!window.__lowPowerMode);return}
  if(overviewOn)return;
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '||e.key==='ArrowDown'){go(idx+1);return}
  if(e.key==='ArrowLeft'||e.key==='PageUp'||e.key==='ArrowUp')go(idx-1);
  if(e.key==='Home')go(0);
  if(e.key==='End')go(total-1);
});

let wheelTO=null,wheelAcc=0;
addEventListener('wheel',e=>{
  wheelAcc+=e.deltaY+e.deltaX;
  if(Math.abs(wheelAcc)>50){go(idx+(wheelAcc>0?1:-1));wheelAcc=0}
  clearTimeout(wheelTO);wheelTO=setTimeout(()=>wheelAcc=0,150);
},{passive:true});

let tx=0,ty=0;
addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
addEventListener('touchend',e=>{
  const dx=(e.changedTouches[0].clientX-tx);
  const dy=(e.changedTouches[0].clientY-ty);
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy))go(idx+(dx<0?1:-1));
},{passive:true});

/* 点击翻页 */
deck.addEventListener('click',e=>{
  if(e.target.closest('button,a,input,select,textarea,#nav,#overview'))return;
  const x=e.clientX/window.innerWidth;
  go(x<1/3?idx-1:idx+1);
});

go(0);
</script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>

<!-- Motion One 动效引擎（本地优先,CDN 兜底） -->
<script type="module">
let motion;
try{motion=await import('./assets/motion.min.js')}catch(e1){
  try{motion=await import('https://cdn.jsdelivr.net/npm/motion@11.11.17/+esm')}catch(e2){
    console.warn('[motion] both failed',e1,e2);
    document.querySelectorAll('[data-anim]').forEach(el=>{el.style.opacity='1';el.style.transform='none'});
  }
}
if(motion){
  const{animate,stagger}=motion;
  document.body.classList.add('motion-ready');
  const EASE=[.4,0,.2,1];
  const slides=[...document.querySelectorAll('.slide')];
  let lastIdx=-1;

  function resetAnims(slide){slide.querySelectorAll('[data-anim]').forEach(el=>{el.style.opacity='';el.style.transform=''})}
  function revealStatic(slide){resetAnims(slide);document.getAnimations?.().forEach(a=>a.cancel());slide.querySelectorAll('[data-anim]').forEach(el=>{el.style.opacity='1';el.style.transform='none'})}

  function playSlide(i){
    const slide=slides[i];if(!slide)return;lastIdx=i;
    if(window.__lowPowerMode){revealStatic(slide);return}
    resetAnims(slide);
    const all=[...slide.querySelectorAll('[data-anim]')];
    if(!all.length)return;
    // 新丑风：快速弹性，干脆利落
    animate(all,{opacity:[0,1],y:[20,0]},{duration:.4,delay:stagger(.06,{start:.05}),easing:EASE});
  }

  window.__playSlide=playSlide;
  playSlide(0);
}
</script>
</body>
